server:
  port: 5000

spring:
  application:
    name: gateway-server

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/master

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true

          routes:
            - id: salon-service
              uri: lb://SALON-SERVICE
              predicates:
                - Path=/salons/**,/admin/salons/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/auth/**,/admin/users/**,/users/**,/api/users/**

            - id: booking-service
              uri: lb://BOOKING-SERVICE
              predicates:
                - Path=/booking/**

            - id: category-service
              uri: lb://CATEGORY-MICROSERVICE
              predicates:
                - Path=/categories/**

            - id: service-offering
              uri: lb://SERVICE-OFFERING
              predicates:
                - Path=/service-offering/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8070/eureka/



services:

  userdb:
    image: mysql:8.0.43
    container_name: userdb
    ports:
      - 3301:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: saloon
    networks:
      - sans

  bookingdb:
    image: mysql:8.0.43
    container_name: bookingdb
    ports:
      - 3302:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: booking_db
    networks:
      - sans

  categorydb:
    image: mysql:8.0.43
    container_name: categorydb
    ports:
      - 3303:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catagory_microservicedb
    networks:
      - sans

  paymentdb:
    image: mysql:8.0.43
    container_name: paymentdb
    ports:
      - 3304:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    networks:
      - sans

  salondb:
    image: mysql:8.0.43
    container_name: salondb
    ports:
      - 3305:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: saloonservice
    networks:
      - sans

  serviceofferingdb:
    image: mysql:8.0.43
    container_name: serviceofferingdb
    ports:
      - 3307:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: service_db
    networks:
      - sans

  eurekaserver:
    image: "dailypurpose/eureka-server:v1"
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8070/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: eureka-server
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

  salonuser:
    image: "dailypurpose/salon-user:v1"
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: salon-user
    depends_on:
      userdb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/saloon"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

  booking:
    image: "dailypurpose/booking-service:v1"
    ports:
      - "5005:5005"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5005/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: booking
    depends_on:
      bookingdb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_APPLICATION_NAME: "booking-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://bookingdb:3306/booking_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

  category:
    image: "dailypurpose/catagory_microservice:v1"
    ports:
      - "5003:5003"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: category
    depends_on:
      categorydb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_APPLICATION_NAME: "category-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://categorydb:3306/catagory_microservicedb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

  payment:
    image: "dailypurpose/payment-services:v1"
    ports:
      - "5006:5006"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5006/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: payment
    depends_on:
      paymentdb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_APPLICATION_NAME: "payment-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://paymentdb:3306/payment_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

  salon:
    image: "dailypurpose/salon-services:v1"
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: salon
    depends_on:
      salondb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_APPLICATION_NAME: "salon-service"
      SPRING_DATASOURCE_URL: "jdbc:mysql://salondb:3306/saloonservice"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

  service-offering:
    image: "dailypurpose/salon-service-offering:v1"
    ports:
      - "5004:5004"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5004/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: service-offering
    depends_on:
      serviceofferingdb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_APPLICATION_NAME: "service-offering"
      SPRING_DATASOURCE_URL: "jdbc:mysql://serviceofferingdb:3306/service_db"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

  gatewayserver:
    image: "dailypurpose/gateway-server:v1"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    container_name: gateway-server
    depends_on:
      eurekaserver:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m"
      SPRING_APPLICATION_NAME: "gateway-server"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - sans

networks:
  sans:
    driver: "bridge"










































